<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Coaching Model Details - Boon Coach Library">
  <title>Coaching Model - Boon Coach Library</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-primary: #466FF6;
      --color-primary-dark: #365ABD;
      --color-accent: #F58E83;
      --color-text: #2E353D;
      --color-text-light: #365ABD;
      --color-bg: #F0F3F7;
      --color-border: #CCD9FF;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
    }

    .navbar {
      background: white;
      border-bottom: 1px solid var(--color-border);
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 500;
      transition: gap 0.3s;
    }

    .nav-back:hover {
      gap: 1rem;
    }

    /* Main Content */
    main {
      padding: 2rem 0;
      min-height: calc(100vh - 200px);
    }

    .model-detail {
      background: white;
      border-radius: 8px;
      padding: 2.5rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      margin-bottom: 2rem;
    }

    /* Header Section */
    .detail-header {
      border-bottom: 2px solid var(--color-border);
      padding-bottom: 2rem;
      margin-bottom: 2rem;
    }

    .detail-header h1 {
      font-size: 2rem;
      color: var(--color-primary);
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    .detail-subtitle {
      font-size: 1rem;
      color: var(--color-text-light);
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .meta {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .meta-label {
      font-weight: 600;
      color: var(--color-text);
      font-size: 0.9rem;
    }

    /* Badges */
    .complexity-badge {
      font-size: 0.75rem;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .complexity-badge.beginner-friendly {
      background: #6CD893;
      color: white;
    }

    .complexity-badge.intermediate {
      background: #FFC969;
      color: white;
    }

    .complexity-badge.advanced {
      background: #FF6D6A;
      color: white;
    }

    /* Content Sections */
    .detail-section {
      margin-bottom: 2.5rem;
    }

    .detail-section h2 {
      font-size: 1.4rem;
      color: var(--color-primary);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 3px solid var(--color-accent);
      display: inline-block;
    }

    .detail-section p {
      line-height: 1.8;
      color: var(--color-text);
      margin-bottom: 1rem;
    }

    .detail-section ul,
    .detail-section ol {
      margin-left: 2rem;
      margin-bottom: 1rem;
    }

    .detail-section li {
      margin-bottom: 0.5rem;
      line-height: 1.6;
    }

    /* Quote Box */
    .quote-box {
      background: #F0F3F7;
      border-left: 4px solid var(--color-accent);
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      border-radius: 4px;
      font-style: italic;
      color: var(--color-text-light);
    }

    /* Footer */
    .detail-footer {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--color-border);
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: var(--color-primary);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.3s;
      font-weight: 500;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      background: var(--color-primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(70, 111, 246, 0.2);
    }

    .btn-secondary {
      background: var(--color-border);
      color: var(--color-primary);
    }

    .btn-secondary:hover {
      background: var(--color-primary);
      color: white;
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 3rem;
      color: #888;
    }

    .loading::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60% { content: '...'; }
      80%, 100% { content: ''; }
    }

    /* Error State */
    .error {
      background: rgba(255, 109, 106, 0.1);
      border: 1px solid #FF6D6A;
      color: #FF6D6A;
      padding: 1.5rem;
      border-radius: 8px;
      margin: 2rem 0;
    }

    /* Footer */
    footer {
      background: var(--color-primary-dark);
      color: white;
      text-align: center;
      padding: 2rem;
      margin-top: 3rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .model-detail {
        padding: 1.5rem;
      }

      .detail-header h1 {
        font-size: 1.5rem;
      }

      .detail-subtitle {
        font-size: 0.95rem;
      }

      .meta {
        flex-direction: column;
        align-items: flex-start;
      }

      .detail-footer {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        text-align: center;
      }
    }

    /* Skeleton Loader */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
    }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-text {
      height: 1rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }

    .skeleton-title {
      height: 1.5rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      width: 60%;
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-back">
        <span>←</span> Back to All Models
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container">
    <article id="modelDetail" class="model-detail">
      <div class="loading">Loading coaching model...</div>
    </article>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Boon. Supporting coaches and leaders in human development.</p>
  </footer>

  <!-- Supabase Client -->
  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Application Logic -->
  <script>
    // Configuration
    const SUPABASE_URL = 'https://psgoldsuyeigwqryenlv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzZ29sZHN1eWVpZ3dxcnllbmx2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDExNzU4NjcsImV4cCI6MjAxNjc1MTg2N30.0VWXqHmBJ1mX7zk2Y4rNp5YqQHxMOKv_7Zf6ynNQoSA';

    // Initialize Supabase
    const { createClient } = window.supabase;
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Load model details on page load
    async function loadModelDetail() {
      try {
        // Get slug from URL parameter
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');

        if (!slug) {
          showError('No model specified.');
          return;
        }

        // Fetch model from database
        const { data: model, error } = await supabase
          .from('coaching_models')
          .select(`
            *,
            model_content(*),
            model_category_mapping(
              model_categories(*)
            ),
            model_program_mapping(
              session_programs(*)
            )
          `)
          .eq('slug', slug)
          .single();

        if (error || !model) {
          showError('Model not found.');
          return;
        }

        // Render model details
        renderModel(model);
      } catch (err) {
        console.error('Error loading model:', err);
        showError('Error loading coaching model. Please try again.');
      }
    }

    // Render model to page
    function renderModel(model) {
      const content = model.model_content?.[0];
      const categories = model.model_category_mapping?.map(m => m.model_categories?.name).filter(Boolean) || [];
      const programs = model.model_program_mapping?.map(m => m.session_programs?.name).filter(Boolean) || [];

      const html = `
        <header class="detail-header">
          <h1>${escapeHtml(model.name)}</h1>
          <p class="detail-subtitle">${escapeHtml(model.description)}</p>
          
          <div class="meta">
            <div class="meta-item">
              <span class="meta-label">Complexity:</span>
              <span class="complexity-badge ${model.complexity.toLowerCase().replace(/-/g, '-')}">
                ${model.complexity}
              </span>
            </div>
            
            ${categories.length > 0 ? `
              <div class="meta-item">
                <span class="meta-label">Categories:</span>
                <span>${categories.join(', ')}</span>
              </div>
            ` : ''}
            
            ${programs.length > 0 ? `
              <div class="meta-item">
                <span class="meta-label">Programs:</span>
                <span>${programs.join(', ')}</span>
              </div>
            ` : ''}
          </div>
        </header>

        <section class="detail-section">
          <h2>Overview</h2>
          <p>${escapeHtml(model.overview || model.description)}</p>
          ${model.best_for ? `
            <div class="quote-box">
              Best for: ${escapeHtml(model.best_for)}
            </div>
          ` : ''}
        </section>

        ${content ? `
          ${content.methodology ? `
            <section class="detail-section">
              <h2>Methodology</h2>
              <p>${formatText(content.methodology)}</p>
            </section>
          ` : ''}

          ${content.real_world_use_cases ? `
            <section class="detail-section">
              <h2>Real-World Use Cases</h2>
              <p>${formatText(content.real_world_use_cases)}</p>
            </section>
          ` : ''}

          ${content.coaching_prompts ? `
            <section class="detail-section">
              <h2>Coaching Prompts & Reflection Questions</h2>
              <p>${formatText(content.coaching_prompts)}</p>
            </section>
          ` : ''}

          ${content.limitations ? `
            <section class="detail-section">
              <h2>Limitations & Critiques</h2>
              <p>${formatText(content.limitations)}</p>
            </section>
          ` : ''}

          ${content.bonus_tools ? `
            <section class="detail-section">
              <h2>Bonus Tools & Integration Ideas</h2>
              <p>${formatText(content.bonus_tools)}</p>
            </section>
          ` : ''}

          ${content.resources ? `
            <section class="detail-section">
              <h2>Recommended Resources</h2>
              <p>${formatText(content.resources)}</p>
            </section>
          ` : ''}
        ` : `
          <section class="detail-section">
            <p><em>Full content coming soon. Check back for detailed methodology, use cases, and coaching prompts.</em></p>
          </section>
        `}

        <footer class="detail-footer">
          <a href="index.html" class="btn btn-secondary">
            ← Back to All Models
          </a>
          <button class="btn" onclick="window.print()">
            🖨 Print This Page
          </button>
        </footer>
      `;

      document.getElementById('modelDetail').innerHTML = html;
    }

    // Show error message
    function showError(message) {
      document.getElementById('modelDetail').innerHTML = `
        <div class="error">
          <strong>Error:</strong> ${escapeHtml(message)}
        </div>
      `;
    }

    // Helper: Escape HTML to prevent XSS
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Helper: Format text with basic markdown support
    function formatText(text) {
      if (!text) return '';
      let formatted = escapeHtml(text);
      
      // Convert line breaks to paragraphs
      formatted = formatted.split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
      
      // Convert **bold** to <strong>
      formatted = formatted.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      
      // Convert *italic* to <em>
      formatted = formatted.replace(/\*(.+?)\*/g, '<em>$1</em>');
      
      return formatted;
    }

    // Load model when page loads
    window.addEventListener('load', loadModelDetail);
  </script>
</body>
</html>
